{{ define "main" }}

{{ partial "navigation.html" . }}

<section class="section strategy-session-page">
  <div class="container">
    <div class="strategy-session-shell">
      <header class="strategy-session-hero">
        <h1>{{ .Title }}</h1>
        {{ with .Params.intro }}
          <p class="strategy-session-intro">{{ . | safeHTML }}</p>
        {{ end }}
      </header>

      <div class="strategy-session-content">
        {{ .Content }}
      </div>
    </div>
  </div>
</section>

{{ end }}
