[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.150.0"

[context.deploy-preview]
  command = "hugo --gc --minify --templateMetrics --templateMetricsHints --buildExpired --buildFuture --forceSyncStatic --baseURL \"$DEPLOY_PRIME_URL\""

[context.branch-deploy]
  command = "hugo --gc --minify --templateMetrics --templateMetricsHints --buildExpired --buildFuture --forceSyncStatic --baseURL \"$DEPLOY_PRIME_URL\""

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/plugins/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
