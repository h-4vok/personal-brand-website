[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.155.1"
  HUGO_UMAMI_WEBSITE_ID = "54ba9f61-ea93-41db-a5e1-3e74b41605da"
  HUGO_UMAMI_SCRIPT_URL = "/stats/script.js"
  HUGO_UMAMI_DOMAINS = "christianguzman.uk"

[context.deploy-preview]
  command = "hugo --gc --minify --templateMetrics --templateMetricsHints --buildExpired --buildFuture --forceSyncStatic --baseURL \"$DEPLOY_PRIME_URL\""

[context.branch-deploy]
  command = "hugo --gc --minify --templateMetrics --templateMetricsHints --buildExpired --buildFuture --forceSyncStatic --baseURL \"$DEPLOY_PRIME_URL\""

[[redirects]]
  from = "/stats/*"
  to = "https://cloud.umami.is/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/english/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/en/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/fr/*"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/strategy-session/"
  to = "/engineering-leadership-coaching/"
  status = 301
  force = true

[[redirects]]
  from = "/strategy-session"
  to = "/engineering-leadership-coaching/"
  status = 301
  force = true

[[redirects]]
  from = "/posts/*"
  to = "/articles/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/plugins/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
