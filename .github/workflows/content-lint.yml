name: Content Lint

on:
  pull_request:
    paths:
      - "content/**/*.md"
      - ".textlintrc*"
      - "cspell*.json"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths:
      - "content/**/*.md"
      - ".textlintrc*"
      - "cspell*.json"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch: {}

concurrency:
  group: content-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  content-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint site content
        run: npm run lint:text
