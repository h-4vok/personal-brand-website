name: Lighthouse CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "static/**"
      - "themes/**"
      - "archetypes/**"
      - "hugo.toml"
      - "hugo.yaml"
      - "hugo.yml"
      - "config/**"
      - "package.json"
      - "package-lock.json"
      - "netlify.toml"
      - "lighthouserc.js"
      - "tools/**"
  push:
    branches:
      - main
    paths:
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "static/**"
      - "themes/**"
      - "archetypes/**"
      - "hugo.toml"
      - "hugo.yaml"
      - "hugo.yml"
      - "config/**"
      - "package.json"
      - "package-lock.json"
      - "netlify.toml"
      - "lighthouserc.js"
      - "tools/**"
  workflow_dispatch: {}

concurrency:
  group: lighthouse-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    env:
      HUSKY: 0
      AUDIT_VERBOSE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.155.1"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          HUGO_BUILD_SHA: ${{ github.sha }}
        run: npm run hugo:build

      - name: Resolve Netlify preview URL
        if: github.event_name == 'pull_request'
        id: preview
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.sha;
            const { data } = await github.rest.repos.listCommitStatusesForRef({
              owner,
              repo,
              ref,
              per_page: 100,
            });

            const previewStatus = data.find((status) => {
              if (!status.target_url || !status.context) return false;
              return /netlify/i.test(status.context) && /netlify\.app/i.test(status.target_url);
            });

            if (!previewStatus) {
              core.setFailed(`No Netlify preview status with a netlify.app target URL found for ${ref}.`);
              return;
            }

            core.info(`Using Netlify preview status "${previewStatus.context}" -> ${previewStatus.target_url}`);
            core.setOutput("url", previewStatus.target_url);

      - name: Run Lighthouse CI
        env:
          LIGHTHOUSE_BASE_URL: ${{ github.event_name == 'pull_request' && steps.preview.outputs.url || 'https://christianguzman.uk' }}
          LIGHTHOUSE_EXPECTED_BUILD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
        run: npm run audit

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-artifacts
          path: |
            .lighthouseci/**
          if-no-files-found: ignore
