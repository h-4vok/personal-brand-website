name: Lighthouse CI

on:
  push:
    branches:
      - main
    paths:
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "static/**"
      - "themes/**"
      - "archetypes/**"
      - "hugo.toml"
      - "hugo.yaml"
      - "hugo.yml"
      - "config/**"
      - "package.json"
      - "package-lock.json"
      - "netlify.toml"
      - "lighthouserc.js"
      - "tools/**"
  workflow_dispatch: {}

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HUSKY: 0
      AUDIT_VERBOSE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI
        env:
          LIGHTHOUSE_BASE_URL: https://christianguzman.uk
        run: npm run audit

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-artifacts
          path: |
            .lighthouseci/**
          if-no-files-found: ignore
