name: Lighthouse CI

on:
  pull_request:
    paths:
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "static/**"
      - "themes/**"
      - "archetypes/**"
      - "hugo.toml"
      - "hugo.yaml"
      - "hugo.yml"
      - "config/**"
      - "package.json"
      - "package-lock.json"
      - "lighthouserc.js"
      - "tools/run-audit.js"
      - "tools/lighthouse-*.js"
  workflow_dispatch: {}

concurrency:
  group: lighthouse-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.155.1"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run hugo:build

      - name: Run Lighthouse CI
        run: npm run audit

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-artifacts
          path: |
            .lighthouseci/**
          if-no-files-found: ignore
