name: Site SEO

on:
  pull_request:
    paths:
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "static/**"
      - "themes/**"
      - "archetypes/**"
      - "hugo.toml"
      - "hugo.yaml"
      - "hugo.yml"
      - "config/**"
      - "package.json"
      - "package-lock.json"
      - "tests/seo-build.test.mjs"
      - "tools/**"
  workflow_dispatch: {}

concurrency:
  group: site-seo-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  site-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.155.1"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate built site SEO contract
        run: npm run test:seo
